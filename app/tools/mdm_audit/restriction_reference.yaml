# ============================================================
# Apple MDM Restrictions Reference
# ============================================================
# Source: Apple Developer Documentation (developer.apple.com/documentation/devicemanagement/restrictions)
#         Apple Platform Deployment Guide (support.apple.com)
# Captured: 2026-03-24
#
# HOW TO MAINTAIN THIS FILE
# --------------------------
# Each entry under `restrictions` has the following fields:
#
#   key         : The exact MDM payload key name
#   type        : boolean | integer | string | [string]
#   default     : The default value when key is absent from profile
#   supervised  : true | false | "deprecated" | "user_enrollment"
#                 true  = requires supervised device
#                 false = works on any enrolled device
#   deprecated  : true | false
#   deprecated_since : iOS version string (e.g. "26.4")
#   deprecated_note  : What to use instead
#   category    : One of the category names listed below
#   description : Human-readable description of what the key does
#
#   secure_value      : The value considered secure for this key (omit if N/A)
#   insecure_if_value : The value that triggers an insecure finding
#   insecure_severity : CRITICAL | HIGH | MEDIUM | LOW
#   insecure_note     : Explanation shown in the report
#
# CATEGORIES (edit as needed):
#   Network         - Wi-Fi, VPN, cellular, Bluetooth
#   Lock Screen     - Lock screen access controls
#   Passcode        - Passcode/biometric policy
#   Physical Access - USB, accessories, host pairing, recovery
#   MDM Integrity   - Profile installation, restrictions, unenrollment
#   Data Protection - Encryption, backup, cloud sync
#   App Control     - Installation, removal, allowed/blocked lists
#   Privacy         - Tracking, diagnostics, AI/cloud services
#   Device          - Name, clock, erase, reset
#   Classroom       - Apple Classroom controls
#   Content         - Ratings, explicit content
#   AI Features     - Apple Intelligence specific keys
#
# CONFLICT RULES are defined separately at the bottom of this file.
# Each rule has:
#   id          : Unique identifier
#   description : Human-readable conflict description
#   severity    : CRITICAL | HIGH | MEDIUM | LOW
#   conditions  : List of {key, value} pairs — ALL must be true to trigger
#   note        : Explanation shown in the report
# ============================================================

restrictions:

  # ── NETWORK ──────────────────────────────────────────────────────────────

  - key: forceWiFiToAllowedNetworksOnly
    type: boolean
    default: false
    supervised: true
    deprecated: false
    category: Network
    description: >
      If true, limits the device to only join Wi-Fi networks configured via
      an MDM Wi-Fi payload. Prevents rogue SSID / evil-twin attacks.
    secure_value: true
    insecure_if_value: false
    insecure_severity: HIGH
    insecure_note: >
      Devices can join any Wi-Fi network including attacker-controlled SSIDs.
      Critical for in-store/kiosk devices. Enable alongside forceWiFiPowerOn.

  - key: forceWiFiPowerOn
    type: boolean
    default: false
    supervised: true
    deprecated: false
    category: Network
    description: >
      If true, prevents the user from turning off Wi-Fi via Settings or
      Control Center. User can still select which network to join.
    secure_value: true
    insecure_if_value: false
    insecure_severity: MEDIUM
    insecure_note: >
      Wi-Fi can be disabled, potentially severing MDM connectivity and
      allowing the device to operate unmonitored on cellular.

  - key: allowVPNCreation
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, only managed apps can create VPN configurations (iOS 18+).
      Prior to iOS 18, also blocked unmanaged apps entirely.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Users can install VPN profiles that bypass network monitoring,
      traffic inspection, or DLP controls.

  - key: allowBluetoothModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: If false, prevents modification of Bluetooth settings.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can enable Bluetooth and use it to transfer data or pair
      unauthorized peripherals.

  - key: allowPersonalHotspotModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, disables modifications to the personal hotspot setting.
      Prevents device being used as a Wi-Fi bridge or tethered access point.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Device can be used as a personal hotspot, creating an uncontrolled
      network access point and potential data exfiltration path.

  - key: allowCloudPrivateRelay
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, disables iCloud Private Relay. Private Relay obscures
      destination IP from network-level monitoring tools.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      iCloud Private Relay is permitted. Traffic destinations are obscured
      from network monitoring, which may interfere with DLP or inspection.

  - key: allowCellularPlanModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: If false, prevents changes to cellular plan settings.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can modify cellular plan settings. Relevant for eSIM management
      and preventing carrier changes on corporate devices.

  - key: allowESIMModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: If false, disables eSIM modifications.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: Users can add, remove, or modify eSIM plans on the device.

  - key: allowESIMOutgoingTransfers
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, prevents transfer of the eSIM to a different device.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: The corporate eSIM can be transferred off the managed device.

  - key: allowNFC
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, disables NFC hardware. Relevant where proximity-based
      data transfer is a concern.
    # No universal secure_value — NFC may be required for contactless payments.
    # Document as informational only.

  - key: allowPasswordProximityRequests
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Network
    description: >
      If false, prevents device from advertising itself for Wi-Fi password
      sharing with nearby devices via Proximity AutoFill.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Device advertises itself to nearby devices for password sharing.
      Should be disabled on managed devices.

  # ── LOCK SCREEN ───────────────────────────────────────────────────────────

  - key: allowLockScreenControlCenter
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Lock Screen
    description: >
      If false, prevents Control Center from appearing on the Lock Screen.
      Blocks access to hardware toggles without unlocking.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Control Center accessible from Lock Screen. Users (or attackers with
      brief physical access) can toggle Wi-Fi, Airplane Mode, and other
      settings without authenticating.

  - key: allowLockScreenNotificationsView
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Lock Screen
    description: >
      If false, disables notification history view on Lock Screen. Users
      still see notifications as they arrive but cannot browse history.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Notification history is visible on the Lock Screen without authentication,
      potentially exposing sensitive corporate communications or data.

  - key: allowLockScreenTodayView
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Lock Screen
    description: If false, disables Today view in Notification Center on Lock Screen.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Today view accessible from Lock Screen without authentication, which
      may expose widget data (calendar events, reminders, etc.).

  - key: allowPassbookWhileLocked
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Lock Screen
    description: >
      If false, hides Wallet notifications from the Lock Screen. Prevents
      access to payment cards and passes without device unlock.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Wallet notifications visible on Lock Screen. On a retail device
      this may expose customer-facing payment flows without authentication.

  # ── PASSCODE ──────────────────────────────────────────────────────────────

  - key: allowPasscodeModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Passcode
    description: >
      If false, prevents adding, changing, or removing the passcode.
      Ignored on Shared iPad.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Users can change or remove the device passcode. On shared or
      kiosk devices this can remove the authentication barrier entirely.

  - key: allowFingerprintForUnlock
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Passcode
    description: >
      If false, prevents Touch ID/Face ID/Optic ID from unlocking the device.
      Forces passcode-only unlock.
    # No universal secure_value — biometric policy is org-dependent.

  - key: allowFingerprintModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Passcode
    description: >
      If false, prevents users from modifying Touch ID or Face ID enrollments.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can enroll new biometrics, including those of unauthorized
      individuals, potentially granting device access.

  - key: forceAutomaticDateAndTime
    type: boolean
    default: false
    supervised: true
    deprecated: false
    category: Device
    description: >
      If true, forces Set Automatically in Date & Time. Prevents clock
      manipulation that could affect certificate validity or log timestamps.
    secure_value: true
    insecure_if_value: false
    insecure_severity: MEDIUM
    insecure_note: >
      System clock can be manipulated by users. This affects certificate
      validation, accurate audit log timestamps, and time-based access controls.

  # ── PHYSICAL ACCESS ───────────────────────────────────────────────────────

  - key: allowUSBRestrictedMode
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Physical Access
    description: >
      If false, allows USB accessories to always connect while device is locked,
      disabling the USB Restricted Mode protection.
      IMPORTANT: Default true = USB Restricted Mode ON (secure). Setting false disables it.
    secure_value: true
    insecure_if_value: false
    insecure_severity: CRITICAL
    insecure_note: >
      USB Restricted Mode is DISABLED. USB accessories (including forensic tools
      such as GrayKey/Cellebrite) can connect to a locked device without
      authentication. This is one of the highest-risk misconfigurations possible.

  - key: allowUnpairedExternalBootToRecovery
    type: boolean
    default: false
    supervised: true
    deprecated: false
    category: Physical Access
    description: >
      If true, allows unpaired external hosts to boot the device into recovery
      mode. Default false is secure. Setting true enables full device wipe
      over USB without any authentication.
    secure_value: false
    insecure_if_value: true
    insecure_severity: CRITICAL
    insecure_note: >
      Any computer can boot this device into recovery mode and perform a
      full wipe/restore over USB without authentication.

  - key: allowHostPairing
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Physical Access
    description: >
      If false, disables host pairing except with the configured supervision
      host. If no supervision cert is configured, disables all pairing.
      Prevents syncing to unauthorized computers.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Device can pair with any computer for data sync, backup, and sideloading.
      Disabling this is a key control against data exfiltration via USB.

  - key: allowFilesNetworkDriveAccess
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Physical Access
    description: If false, prevents connecting to network drives in the Files app.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can connect to arbitrary network shares from the Files app,
      enabling data exfiltration to external network locations.

  - key: allowFilesUSBDriveAccess
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Physical Access
    description: If false, prevents connecting to USB storage devices in the Files app.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can connect USB storage devices via the Files app and copy
      data off the device without restriction.

  - key: allowAutoUnlock
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Physical Access
    description: >
      If false, prevents Apple Watch from auto-unlocking the device. On
      shared devices, any paired watch could unlock the device.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Apple Watch auto-unlock is enabled. On a shared or kiosk device any
      user with a paired Apple Watch could unlock without passcode entry.

  # ── MDM INTEGRITY ─────────────────────────────────────────────────────────

  - key: allowUIConfigurationProfileInstallation
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: MDM Integrity
    description: >
      If false, prohibits users from manually installing configuration profiles
      and certificates. Prevents rogue profile/cert installation.
    secure_value: false
    insecure_if_value: true
    insecure_severity: CRITICAL
    insecure_note: >
      Users can manually install configuration profiles and certificates.
      An attacker could install a malicious CA certificate or a permissive
      MDM profile that overrides existing restrictions.

  - key: allowEnablingRestrictions
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: MDM Integrity
    description: >
      If false, disables the Screen Time/Restrictions option in Settings.
      Prevents users from setting their own conflicting restrictions.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can configure their own Screen Time restrictions, which may
      conflict with or partially override MDM-enforced policies.

  - key: allowEraseContentAndSettings
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: MDM Integrity
    description: >
      If false, disables Erase All Content and Settings in the Reset UI.
      Prevents users from wiping a managed device.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Users can wipe the device via Settings. On devices enrolled via Automated
      Device Enrollment (ADE/DEP), the device will re-enroll at next setup,
      mitigating permanent loss of management. On manually-enrolled devices, a
      wipe permanently removes MDM. Critical on shared, kiosk, or non-ADE devices.

  - key: allowDeviceNameModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: MDM Integrity
    description: If false, prevents users from changing the device name.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can change the device name, complicating inventory tracking
      and MDM asset management.

  - key: allowAccountModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: MDM Integrity
    description: >
      If false, disables modification of Apple Accounts and internet-based
      accounts (Mail, Contacts, Calendar).
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can add or modify accounts including Apple Accounts, potentially
      enabling iCloud sync of corporate data to personal accounts.

  # ── DATA PROTECTION ───────────────────────────────────────────────────────

  - key: forceEncryptedBackup
    type: boolean
    default: false
    supervised: false
    deprecated: false
    category: Data Protection
    description: If true, forces all device backups to be encrypted.
    secure_value: true
    insecure_if_value: false
    insecure_severity: MEDIUM
    insecure_note: >
      Local backups (Finder/iTunes) are not forced to be encrypted and may be
      stored in plaintext on the computer. iCloud backups are encrypted by Apple
      regardless of this setting. Relevant when devices are backed up to
      computers that may not have full disk encryption.

  - key: allowCloudBackup
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: If false, disables iCloud backup.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      iCloud backup is enabled. Corporate data on the device may be backed
      up to personal iCloud accounts.

  - key: allowCloudDocumentSync
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Data Protection
    description: If false, disables iCloud document and key-value sync.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Documents and app data can sync to iCloud, potentially exfiltrating
      corporate data to personal cloud storage.

  - key: allowManagedAppsCloudSync
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: If false, prevents managed apps from using iCloud sync.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Managed app data can sync to iCloud. Corporate data handled by
      managed apps may be uploaded to personal iCloud accounts.

  - key: allowCloudKeychainSync
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: If false, disables iCloud Keychain synchronization.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Device credentials stored in Keychain can sync to personal iCloud
      accounts via iCloud Keychain.

  - key: allowOpenFromManagedToUnmanaged
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: >
      If false, documents from managed apps/accounts can only be opened
      in other managed destinations. Enforces data boundary.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Corporate documents from managed apps can be opened in unmanaged
      (personal) apps, bypassing the managed/unmanaged data boundary.

  - key: allowOpenFromUnmanagedToManaged
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: >
      If false, documents from unmanaged apps/accounts can only be opened
      in other unmanaged destinations.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Unmanaged app data can be introduced into managed app contexts,
      potentially contaminating corporate data stores.

  - key: allowUntrustedTLSPrompt
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: >
      If false, the system automatically rejects untrusted HTTPS certificates
      without prompting the user. Setting false is the SECURE configuration.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Users are prompted to trust untrusted TLS certificates. This enables
      acceptance of self-signed or attacker-controlled certificates,
      facilitating man-in-the-middle attacks.

  - key: allowOTAPKIUpdates
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Data Protection
    description: >
      If false, disables over-the-air PKI updates. Does not disable CRL/OCSP.
    # Generally this should remain true; disabling it can break cert chain updates.

  # ── APP CONTROL ───────────────────────────────────────────────────────────

  - key: allowAppInstallation
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: >
      If false, disables the App Store and prevents app installation.
      MDM commands can still push apps in iOS 10+.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can install arbitrary apps from the App Store, expanding the
      attack surface beyond the approved application set.

  - key: allowMarketplaceAppInstallation
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: >
      If false, prevents installation of alternative marketplace apps and
      prevents installed alternative marketplace apps from installing apps.
      EU DMA-only feature — only functional for devices with EU Apple Accounts.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Alternative marketplace app installation is permitted, creating an
      app install vector outside App Store review. This is an EU DMA-only
      feature and does not apply to devices outside the European Union.

  - key: allowWebDistributionAppInstallation
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: >
      If false, prevents installation of apps directly from the web.
      EU DMA-only feature — only functional for devices with EU Apple Accounts.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Apps can be installed directly from websites, bypassing both App Store
      and MDM app management controls. This is an EU DMA-only feature and
      does not apply to devices outside the European Union.

  - key: allowAppRemoval
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: If false, prevents removal of installed apps.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can remove MDM-managed apps, disrupting required workflows
      and potentially removing security-relevant tools (e.g., MDM agent).

  - key: allowAppsToBeHidden
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: If false, prevents users from hiding apps.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can hide apps, obscuring actual app state from visual inspection
      and potentially complicating compliance audits.

  - key: allowAppsToBeLocked
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: App Control
    description: >
      If false, prevents users from locking apps. Because hiding requires
      locking, disallowing locking also prevents hiding.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can lock apps with additional authentication, which may interfere
      with MDM visibility and auditing of app usage.

  # ── PRIVACY ───────────────────────────────────────────────────────────────

  - key: allowDiagnosticSubmission
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Privacy
    description: >
      If false, prevents automatic diagnostic report submission to Apple.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Device diagnostic data including usage patterns and crash reports
      are transmitted to Apple automatically.

  - key: allowScreenShot
    type: boolean
    default: true
    supervised: false
    deprecated: false
    category: Privacy
    description: If false, disables screenshots and screen recordings.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can take screenshots and screen recordings of corporate data,
      facilitating data exfiltration via the camera roll or AirDrop.

  - key: allowProximitySetupToNewDevice
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Privacy
    description: >
      If false, disables the prompt to set up new nearby Apple devices.
      Also prevents exporting data to set up new Android devices (iOS 26.3+).
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Device will prompt to assist in setting up nearby Apple devices
      and can export device data to configure new Android devices.

  - key: allowExternalIntelligenceIntegrations
    type: boolean
    default: true
    supervised: false
    deprecated: true
    deprecated_since: "26.4"
    deprecated_note: "Use replacement Apple Intelligence controls in iOS 26.4+"
    category: Privacy
    description: >
      If false, disables external cloud-based AI services with Siri
      (currently ChatGPT and Google Lens visual intelligence).
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      External AI cloud integrations are permitted. Corporate data entered
      via Siri or visual intelligence may be transmitted to third-party
      AI services (ChatGPT, Google). DEPRECATED in iOS 26.4.

  - key: allowExternalIntelligenceIntegrationsSignIn
    type: boolean
    default: true
    supervised: false
    deprecated: true
    deprecated_since: "26.4"
    deprecated_note: "Use replacement Apple Intelligence controls in iOS 26.4+"
    category: Privacy
    description: >
      If false, forces external AI providers into anonymous mode and
      signs out any currently signed-in user.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can sign in to external AI services (ChatGPT etc.) via Siri,
      associating corporate queries with personal accounts.
      DEPRECATED in iOS 26.4.

  # ── DEVICE ────────────────────────────────────────────────────────────────

  - key: allowWallpaperModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Device
    description: If false, prevents changing Lock Screen or Home Screen wallpaper.
    secure_value: false
    insecure_if_value: true
    insecure_severity: LOW
    insecure_note: >
      Users can modify device wallpaper. Minor on managed devices but
      relevant for kiosk/brand-locked deployments.

  - key: allowNotificationsModification
    type: boolean
    default: true
    supervised: true
    deprecated: false
    category: Device
    description: >
      If false, disables modification of notification settings. Ensures
      MDM-pushed notification policy cannot be user-overridden.
    secure_value: false
    insecure_if_value: true
    insecure_severity: MEDIUM
    insecure_note: >
      Users can modify notification settings, potentially re-enabling
      lock-screen notification previews that were disabled by policy.

  # ── SOFTWARE UPDATES ──────────────────────────────────────────────────────

  - key: forceDelayedSoftwareUpdates
    type: boolean
    default: false
    supervised: true
    deprecated: true
    deprecated_since: "26"
    deprecated_note: "Use declarative software update controls (SoftwareUpdate declaration)"
    category: Device
    description: >
      If true, delays user visibility of software updates by
      enforcedSoftwareUpdateDelay days (max 90).
    # Assessed in conjunction with enforcedSoftwareUpdateDelay

  - key: enforcedSoftwareUpdateDelay
    type: integer
    default: 30
    supervised: true
    deprecated: true
    deprecated_since: "26"
    deprecated_note: "Use declarative software update controls"
    category: Device
    description: >
      Number of days (1-90) to delay software update visibility.
      Used with forceDelayedSoftwareUpdates.
    insecure_if_value: 90
    insecure_severity: HIGH
    insecure_note: >
      Software updates are delayed by 90 days (maximum). Devices may remain
      unpatched for up to 3 months after security updates are released,
      including updates for actively exploited vulnerabilities.

  - key: allowRapidSecurityResponseInstallation
    type: boolean
    default: true
    supervised: true
    deprecated: true
    deprecated_since: "26"
    deprecated_note: "Use declarative software update controls in iOS 26+"
    category: Device
    description: >
      If false, prohibits installation of Rapid Security Responses
      (out-of-band emergency security patches).
    secure_value: true
    insecure_if_value: false
    insecure_severity: HIGH
    insecure_note: >
      Rapid Security Responses (emergency patches) cannot be installed.
      DEPRECATED in iOS 26.

  - key: allowRapidSecurityResponseRemoval
    type: boolean
    default: true
    supervised: true
    deprecated: true
    deprecated_since: "26"
    deprecated_note: "Use declarative software update controls in iOS 26+"
    category: Device
    description: >
      If false, prohibits removal of installed Rapid Security Responses.
    secure_value: false
    insecure_if_value: true
    insecure_severity: HIGH
    insecure_note: >
      Users can remove Rapid Security Responses (emergency patches),
      reverting the device to a known-vulnerable state. DEPRECATED in iOS 26.

