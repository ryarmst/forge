# ============================================================
# CONFLICT RULES
# ============================================================
# Each rule defines a set of conditions that, if ALL true simultaneously,
# indicate a conflicting configuration.
# conditions: list of {key: ..., op: ..., value: ...}
#   op: eq (equals) | ne (not equals) | gt (greater than) | lt (less than)
# ============================================================

conflict_rules:

  - id: CONF_001
    description: "App Store blocked but alternative install vectors open"
    severity: HIGH
    note: >
      allowAppInstallation is false (blocking App Store installs) but
      allowMarketplaceAppInstallation or allowWebDistributionAppInstallation is true.
      This creates alternative uncontrolled installation vectors that bypass the
      intended app lockdown. Note: marketplace and web distribution are currently
      EU DMA-only features and may not apply outside the European Union.
    conditions:
      - key: allowAppInstallation
        op: eq
        value: false
      - key: allowMarketplaceAppInstallation
        op: eq
        value: true

  - id: CONF_002
    description: "USB host pairing blocked but USB drive access open"
    severity: MEDIUM
    note: >
      allowHostPairing is false (preventing computer pairing for sync/backup) but
      allowFilesUSBDriveAccess is true (allowing USB storage via Files app). The intent
      to limit USB data transfer is undermined — users can still copy data to external
      USB drives even though computer pairing is blocked. Consider disabling USB drive
      access to fully close USB-based data exfiltration.
    conditions:
      - key: allowHostPairing
        op: eq
        value: false
      - key: allowFilesUSBDriveAccess
        op: eq
        value: true

  - id: CONF_003
    description: "USB Restricted Mode disabled alongside USB drive access"
    severity: CRITICAL
    note: >
      allowUSBRestrictedMode is false (USB accessories can connect while locked) AND
      allowFilesUSBDriveAccess is true. This combination means a locked device can be
      probed via USB and data can be transferred to external storage without authentication.
    conditions:
      - key: allowUSBRestrictedMode
        op: eq
        value: false
      - key: allowFilesUSBDriveAccess
        op: eq
        value: true

  - id: CONF_004
    description: "Siri disabled but external AI integrations permitted"
    severity: LOW
    note: >
      allowAssistant is false (Siri disabled) but allowExternalIntelligenceIntegrations
      and/or allowExternalIntelligenceIntegrationsSignIn is true. These AI keys are
      currently inert, but represent a latent risk if Siri is ever re-enabled without
      revisiting these settings. Also, all three keys are deprecated in iOS 26.4.
    conditions:
      - key: allowAssistant
        op: eq
        value: false
      - key: allowExternalIntelligenceIntegrations
        op: eq
        value: true

  - id: CONF_005
    description: "Safari disabled but default browser modification permitted"
    severity: LOW
    note: >
      allowSafari is false but allowDefaultBrowserModification is true. Safari is blocked
      but users can modify which browser is set as default. This is redundant and potentially
      confusing — lock the default browser to prevent any future browser substitution.
    conditions:
      - key: allowSafari
        op: eq
        value: false
      - key: allowDefaultBrowserModification
        op: eq
        value: true

  - id: CONF_006
    description: "AutoFill disabled but authentication-before-AutoFill not enforced"
    severity: LOW
    note: >
      allowPasswordAutoFill is false but forceAuthenticationBeforeAutoFill is also false.
      If AutoFill is ever re-enabled, credentials will auto-fill without requiring
      biometric/passcode confirmation. Set forceAuthenticationBeforeAutoFill=true proactively.
    conditions:
      - key: allowPasswordAutoFill
        op: eq
        value: false
      - key: forceAuthenticationBeforeAutoFill
        op: eq
        value: false

  - id: CONF_007
    description: "Both current and deprecated Wi-Fi network locking keys present and disabled"
    severity: MEDIUM
    note: >
      Both forceWiFiToAllowedNetworksOnly (current) and forceWiFiWhitelisting (deprecated,
      iOS 14.5+) are present and set to false. The presence of both suggests the profile
      has been carried forward from older versions without cleanup. Remove the deprecated
      key and ensure the current key is set to true if network locking is intended.
    conditions:
      - key: forceWiFiToAllowedNetworksOnly
        op: eq
        value: false
      - key: forceWiFiWhitelisting
        op: eq
        value: false

  - id: CONF_008
    description: "Software update delay at maximum with RSR removal permitted"
    severity: HIGH
    note: >
      enforcedSoftwareUpdateDelay is 90 (maximum) AND allowRapidSecurityResponseRemoval
      is true. Regular updates are delayed 90 days AND emergency out-of-band security
      patches can be removed by users. This leaves devices maximally exposed to known
      vulnerabilities.
    conditions:
      - key: enforcedSoftwareUpdateDelay
        op: eq
        value: 90
      - key: allowRapidSecurityResponseRemoval
        op: eq
        value: true

  - id: CONF_009
    description: "Profile removal not disallowed (PayloadRemovalDisallowed=false)"
    severity: LOW
    note: >
      PayloadRemovalDisallowed is false or absent. On iOS and macOS 10.15+, MDM-installed
      profiles CANNOT be removed by the user regardless of this setting — this key only
      affects manually-installed profiles. On macOS pre-10.15, users could remove MDM
      profiles if this was false. Setting to true is still a best practice but the
      practical impact is limited on modern OS versions with MDM enrollment.
    conditions:
      - key: PayloadRemovalDisallowed
        op: ne
        value: true
