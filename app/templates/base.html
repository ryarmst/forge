<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Forge{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS Custom Properties -->
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #161a1f;
      --surface-2: #1e232a;
      --border: #2a2f38;
      --text: #c8cdd6;
      --text-muted: #5a6172;
      --accent: #00d4aa;
      --accent-warm: #f59e0b;
      --danger: #ef4444;
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
  </style>

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <a href="/" class="nav__logo">⬡ <span>FORGE</span></a>
    <ul class="nav__links">
      <li><a href="/">Dashboard</a></li>
      <li><a href="https://github.com" target="_blank" rel="noopener">GitHub</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    Forge v0.1.0 <span>·</span> Built for security testing
  </footer>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Main JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
