# Production compose — Caddy (mTLS on 443) + Forge app.
# Certs are mounted from the host at ~/forge/certs/.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
    depends_on:
      - forge
    restart: unless-stopped

  forge:
    image: ghcr.io/ryarmst/forge:latest
    expose:
      - "5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production

volumes:
  caddy_data:
